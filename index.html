<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>
  <header>
    <h1>Library</h1>
    <button class="add-button">New Book</button>
  </header>
  <main id="library-container">
  </main>
  <dialog closedby="any" id="book-adder">
    <form action="#" method="post" class="book-details">
      <fieldset class="input-fields">
        <div>
          <label for="title">Book Title</label>
          <input type="text" name="title" id="title" required>
        </div>
        <div>
          <label for="author">Book Author</label>
          <input type="text" name="author" id="author" required>
        </div>
        <div>
          <label for="pages">Pages</label>
          <input type="number" name="pages" id="pages" required min="1">
        </div>
      </fieldset>

      <fieldset class="read-status">
        <legend>Have You read the book?</legend>
        <div class="status-container">
          <label for="read">
            <input type="radio" name="status" id="read">Yes
          </label>
          <label for="not-read">
            <input type="radio" name="status" id="not-read">No
          </label>
        </div>
      </fieldset>

      <button type="submit" class="submit-book-form">Add Book</button>
    </form>
  </dialog>
</body>

</html>
